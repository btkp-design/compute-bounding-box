name: CI

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

jobs:
  build-and-test:
    name: Build (${{ matrix.os }}, ${{ matrix.optimization }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        uses: ./.github/actions/install-dependencies

      - name: Build
        run: make CXX=g++ CFLAGS=-O0

      - uses: actions/upload-artifact@v4
        with:
          name: compute-bounding-box-${{ matrix.os }}
          path: compute-bounding-box
